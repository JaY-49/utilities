<div class="mx-auto max-w-6xl w-full flex flex-col gap-8 animate-[fadeUp_0.5s_cubic-bezier(0.16,1,0.3,1)_both]">
    <div class="flex items-end justify-between">
        <h2 class="font-serif text-4xl italic tracking-tight text-slate-900 leading-none">
            Text Toolbox
        </h2>
        <span class="text-md font-mono font-medium tracking-[0.18em] uppercase text-slate-400 pb-1">
            Text Utilities
        </span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div class="flex flex-col items-center gap-1.5 p-5 bg-white border border-slate-200 rounded-2xl">
            <span class="text-[9px] font-mono font-semibold tracking-[0.2em] uppercase text-slate-400">Characters</span>
            <span class="font-serif text-4xl italic text-slate-700 leading-none tracking-tight">{{
                stats().chars
                }}</span>
        </div>

        <div class="flex flex-col items-center gap-1.5 p-5 bg-white border border-slate-200 rounded-2xl">
            <span class="text-[9px] font-mono font-semibold tracking-[0.2em] uppercase text-slate-400">Lines</span>
            <span class="font-serif text-4xl italic text-slate-700 leading-none tracking-tight">{{
                stats().lines
                }}</span>
        </div>

        <div class="flex flex-col items-center gap-1.5 p-5 bg-white border border-slate-200 rounded-2xl">
            <span class="text-[9px] font-mono font-semibold tracking-[0.2em] uppercase text-slate-400">Words</span>
            <span class="font-serif text-4xl italic text-slate-700 leading-none tracking-tight">{{
                stats().words
                }}</span>
        </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-px bg-linear-to-r from-transparent via-slate-200 to-transparent">
        </div>

        <div class="flex flex-col gap-6">
            <div class="flex flex-wrap gap-6 pb-4 border-b border-slate-100">
                <div class="flex flex-col gap-2">
                    <span class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                        Casing
                    </span>
                    <div class="flex flex-wrap gap-2">
                        <button (click)="toUpperCase()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            UPPERCASE
                        </button>
                        <button (click)="toLowerCase()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            lowercase
                        </button>
                        <button (click)="toCamel()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            camelCase
                        </button>
                        <button (click)="toSnake()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            snake_case
                        </button>
                        <button (click)="toKebab()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            kebab-case
                        </button>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <span class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                        Lines
                    </span>
                    <div class="flex flex-wrap gap-2">
                        <button (click)="removeDuplicates()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            Unique
                        </button>
                        <button (click)="sortLines()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            Sort
                        </button>
                        <button (click)="trimLines()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            Trim
                        </button>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <span class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                        JSON
                    </span>
                    <div class="flex flex-wrap gap-2">
                        <button (click)="escapeJson()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            Escape
                        </button>
                        <button (click)="unescapeJson()"
                            class="h-12 px-4 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            Unescape
                        </button>
                    </div>
                </div>

                <div class="flex flex-col gap-2 ml-auto">
                    <span class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                        Actions
                    </span>
                    <div class="flex gap-2">
                        <button (click)="copy()" [disabled]="!text()"
                            class="h-12 px-6 bg-slate-900 hover:bg-slate-700 text-white rounded-2xl font-mono text-md font-medium tracking-[0.15em] uppercase transition-all duration-150 active:scale-[0.97]">
                            Copy
                        </button>
                        <button (click)="clear()"
                            class="h-12 px-6 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                            Clear
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                    Text Input
                </label>

                <div
                    class="px-4 py-3.5 bg-slate-50 rounded-2xl border border-slate-200 focus-within:border-blue-400 focus-within:bg-white focus-within:ring-4 focus-within:ring-blue-50 transition-all duration-200">
                    <textarea [(ngModel)]="text" rows="8" placeholder="Type or paste something..."
                        class="w-full font-mono text-sm leading-relaxed bg-transparent border-none outline-none text-slate-800 placeholder:text-slate-300 resize-y custom-scrollbar"></textarea>
                </div>
            </div>
        </div>
    </div>
</div>
