<div class="mx-auto max-w-6xl w-full flex flex-col gap-8 animate-[fadeUp_0.5s_cubic-bezier(0.16,1,0.3,1)_both]">
    <!-- Header -->
    <div class="flex items-end justify-between">
        <h2 class="font-serif text-4xl italic tracking-tight text-slate-900 leading-none">
            Diff Checker
        </h2>

        <span class="text-md font-mono font-medium tracking-[0.18em] uppercase text-slate-400 pb-1">
            Text Comparison
        </span>
    </div>

    <!-- Input Card -->
    <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-px bg-linear-to-r from-transparent via-slate-200 to-transparent">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Original -->
            <div class="flex flex-col gap-2">
                <label class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                    Original
                </label>

                <div
                    class="px-4 py-3.5 bg-slate-50 rounded-2xl border border-slate-200 focus-within:border-blue-400 focus-within:bg-white focus-within:ring-4 focus-within:ring-blue-50 transition-all duration-200">
                    <textarea [(ngModel)]="original" rows="6" placeholder="Paste original text..."
                        class="w-full font-mono text-sm bg-transparent border-none outline-none text-slate-800 placeholder:text-slate-300 resize-none"></textarea>
                </div>
            </div>

            <!-- Modified -->
            <div class="flex flex-col gap-2">
                <label class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                    Modified
                </label>

                <div
                    class="px-4 py-3.5 bg-slate-50 rounded-2xl border border-slate-200 focus-within:border-blue-400 focus-within:bg-white focus-within:ring-4 focus-within:ring-blue-50 transition-all duration-200">
                    <textarea [(ngModel)]="modified" rows="6" placeholder="Paste modified text..."
                        class="w-full font-mono text-sm bg-transparent border-none outline-none text-slate-800 placeholder:text-slate-300 resize-none"></textarea>
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex flex-wrap gap-3 mt-6">
            <button (click)="compare()" [disabled]="!original() && !modified()"
                class="h-12 px-6 bg-slate-900 hover:bg-slate-700 text-white rounded-2xl font-mono text-md font-medium tracking-[0.15em] uppercase transition-all duration-150 active:scale-[0.97]">
                Compare
            </button>

            <button (click)="swapTexts()"
                class="h-12 px-5 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-400 hover:text-slate-600 font-mono text-md tracking-[0.12em] uppercase">
                Swap
            </button>

            <button (click)="clear()"
                class="h-12 px-5 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-400 hover:text-slate-600 font-mono text-md tracking-[0.12em] uppercase">
                Clear
            </button>
        </div>
    </div>

    @if (stats()) {
    <!-- Stats -->
    <div class="grid grid-cols-3 gap-3">
        <div class="flex flex-col items-center gap-1.5 p-5 bg-white border border-slate-200 rounded-2xl">
            <span class="text-[9px] font-mono font-semibold tracking-[0.2em] uppercase text-slate-400">Unchanged</span>
            <span class="font-serif text-4xl italic text-slate-700 leading-none tracking-tight">
                {{ stats()!.same }}
            </span>
        </div>

        <div class="flex flex-col items-center gap-1.5 p-5 bg-white border border-green-200 rounded-2xl">
            <span class="text-[9px] font-mono font-semibold tracking-[0.2em] uppercase text-green-500">Added</span>
            <span class="font-serif text-4xl italic text-green-600 leading-none tracking-tight">
                +{{ stats()!.added }}
            </span>
        </div>

        <div class="flex flex-col items-center gap-1.5 p-5 bg-white border border-red-200 rounded-2xl">
            <span class="text-[9px] font-mono font-semibold tracking-[0.2em] uppercase text-red-500">Removed</span>
            <span class="font-serif text-4xl italic text-red-600 leading-none tracking-tight">
                -{{ stats()!.removed }}
            </span>
        </div>
    </div>

    <!-- Diff Output -->
    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
        <div class="diff-output overflow-auto max-h-125 font-mono text-sm">
            @for (line of diffLines(); track $index) {
            <div class="flex items-stretch border-b border-slate-50" [class.bg-green-50]="line.type === 'added'"
                [class.bg-red-50]="line.type === 'removed'">
                <span
                    class="w-12 shrink-0 text-center py-1.5 text-xs text-slate-400 border-r border-slate-100 select-none bg-slate-50/50">
                    {{ line.lineNum }}
                </span>

                <span class="w-6 shrink-0 text-center py-1.5 text-xs font-bold select-none"
                    [class.text-green-600]="line.type === 'added'" [class.text-red-600]="line.type === 'removed'">
                    {{ line.type === 'added' ? '+' : line.type === 'removed' ? '−' : ' ' }}
                </span>

                <span class="py-1.5 px-3 whitespace-pre flex-1" [class.text-green-800]="line.type === 'added'"
                    [class.text-red-800]="line.type === 'removed'" [class.text-slate-600]="line.type === 'same'">
                    {{ line.text }}
                </span>
            </div>
            }
        </div>
    </div>
    }
</div>
