<div class="mx-auto max-w-6xl w-full flex flex-col gap-8 animate-[fadeUp_0.5s_cubic-bezier(0.16,1,0.3,1)_both]">
    <div class="flex items-end justify-between">
        <h2 class="font-serif text-4xl italic tracking-tight text-slate-900 leading-none">
            Text Column Aligner
        </h2>
        <span class="text-md font-mono font-medium tracking-[0.18em] uppercase text-slate-400 pb-1">
            Formatting Tool
        </span>
    </div>

    <div class="flex flex-wrap items-end gap-6">
        <div class="flex flex-col gap-2">
            <label class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                Delimiter
            </label>
            <div
                class="px-4 py-3.5 bg-slate-50 rounded-2xl border border-slate-200 focus-within:border-blue-400 focus-within:bg-white focus-within:ring-4 focus-within:ring-blue-50 transition-all duration-200">
                <select [(ngModel)]="delimiter"
                    class="w-full font-mono text-sm bg-transparent border-none outline-none text-slate-800">
                    <option value="auto">Auto (whitespace)</option>
                    <option value="comma">Comma</option>
                    <option value="tab">Tab</option>
                    <option value="pipe">Pipe |</option>
                    <option value="semicolon">Semicolon</option>
                </select>
            </div>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400">
                Alignment
            </label>
            <div
                class="px-4 py-3.5 bg-slate-50 rounded-2xl border border-slate-200 focus-within:border-blue-400 focus-within:bg-white focus-within:ring-4 focus-within:ring-blue-50 transition-all duration-200">
                <select [(ngModel)]="alignment"
                    class="w-full font-mono text-sm bg-transparent border-none outline-none text-slate-800">
                    <option value="left">Left</option>
                    <option value="right">Right</option>
                    <option value="center">Center</option>
                </select>
            </div>
        </div>

        <div class="flex gap-3 ml-auto">
            <button (click)="copy()" [disabled]="!output()"
                class="h-12 px-6 bg-slate-900 hover:bg-slate-700 text-white rounded-2xl font-mono text-md font-medium tracking-[0.15em] uppercase transition-all duration-150 active:scale-[0.97]">
                Copy
            </button>
            <button (click)="clear()"
                class="h-12 px-6 border border-slate-200 rounded-2xl bg-transparent hover:bg-slate-50 text-slate-500 hover:text-slate-700 font-mono text-md tracking-[0.12em] uppercase">
                Clear
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm relative overflow-hidden">
            <div
                class="absolute top-0 left-0 right-0 h-px bg-linear-to-r from-transparent via-slate-200 to-transparent">
            </div>

            <span class="text-md font-mono font-semibold tracking-[0.18em] uppercase text-slate-400 mb-4 block">
                Input
            </span>

            <div
                class="px-4 py-3.5 bg-slate-50 rounded-2xl border border-slate-200 focus-within:border-blue-400 focus-within:bg-white focus-within:ring-4 focus-within:ring-blue-50 transition-all duration-200">
                <textarea [(ngModel)]="input" rows="14"
                    placeholder="Name Age City&#10;John 30 NYC&#10;Jane 25 Los Angeles"
                    class="w-full font-mono text-sm leading-relaxed bg-transparent border-none outline-none text-slate-800 placeholder:text-slate-300 resize-none"></textarea>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden flex flex-col">
            <div class="px-6 py-3 border-b border-slate-200 bg-slate-50">
                <span class="text-md font-mono font-semibold uppercase tracking-[0.2em] text-slate-500">
                    Aligned Output
                </span>
            </div>

            <div class="grow overflow-auto custom-scrollbar">
                @if (output()) {
                <div class="bg-slate-900 p-6">
                    <pre
                        class="m-0 font-mono text-[13px] leading-relaxed text-emerald-100 select-all whitespace-pre">{{ output() }}</pre>
                </div>
                } @else {
                <div class="h-full min-h-80 flex flex-col items-center justify-center text-slate-300 gap-4">
                    <mat-icon class="w-20 h-20 text-[5rem] opacity-20" svgIcon="align-left"></mat-icon>
                    <p class="font-medium tracking-wide">Aligned text will appear here</p>
                </div>
                }
            </div>
        </div>
    </div>
</div>
